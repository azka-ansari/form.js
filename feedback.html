<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>

    <div id="main-contaner">
        <form id="form" onsubmit="submitForm(event)">
            <div>
                <label for="name-input">
                    <h1>This is my Form</h1>

                    <ul>
                        <li>
                            Name:<input type="text" id="name-input">
                        </li>
                    </ul>
                </label>
            </div>
            <div>
                <label for="email-input">

                    <ul>
                        <li>
                            Email: <input type="email" id="email-input">
                        </li>
                    </ul>
                </label>
            </div>
            <div>
                <label for="password-input">

                    <ul>
                        <li>
                            Password: <input type="password" id="password-input">
                        </li>
                    </ul>
                </label>
            </div>

          <div id="radio-contaner">

    <div>
        <h1>Please enter an emotion</h1>

        <label>
            <ul>
                <li>
                    Angry :
                    <input type="radio" name="emotion" value="Angry">
                </li>
            </ul>
        </label>
    </div>

    <div>
        <label>
            <ul>
                <li>
                    Happy :
                    <input type="radio" name="emotion" value="Happy">
                </li>
            </ul>
        </label>
    </div>

    <div>
        <label>
            <ul>
                <li>
                    Sad :
                    <input type="radio" name="emotion" value="Sad">
                </li>
            </ul>
        </label>
    </div>

</div>
            <button type="submit">Submit</button>
        </form>
    </div>
